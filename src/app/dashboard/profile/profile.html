<div class="flex justify-center">
  <div class="bg-white p-6 rounded shadow w-full max-w-md">

    <!-- CARD HEADER WITH ICON -->
    <div class="mb-4 flex items-center space-x-2">
      <span class="text-blue-600 text-2xl">👤</span>
      <h2 class="text-xl font-bold text-gray-800">My Profile</h2>
    </div>

    <hr class="mb-4 border-gray-200" />

    <!-- VIEW MODE -->
    <div *ngIf="!isEdit" class="space-y-3">

      <div class="flex justify-between">
        <span class="font-semibold text-gray-600">Name</span>
        <span class="text-gray-900">{{ profile.name }}</span>
      </div>

      <div class="flex justify-between">
        <span class="font-semibold text-gray-600">Email</span>
        <span class="text-gray-900">{{ profile.email }}</span>
      </div>

      <div class="flex justify-between">
        <span class="font-semibold text-gray-600">Status</span>
        <span class="font-medium text-green-600">{{ profile.status }}</span>
      </div>

      <!-- ✅ EDIT BUTTON (FIXED) -->
      <button
        type="button"
        class="mt-6 bg-blue-600 text-white px-4 py-2 rounded
               hover:bg-blue-700 transition-colors duration-300"
        (click)="edit()">
        Edit
      </button>
    </div>

    <!-- EDIT MODE -->
    <div *ngIf="isEdit"
         class="mt-4 bg-gray-50 p-4 rounded space-y-3">

      <div>
        <label class="block font-medium text-gray-700 mb-1">Name</label>
        <input
          [(ngModel)]="profile.name"
          class="w-full border p-2 rounded
                 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
      </div>

      <div>
        <label class="block font-medium text-gray-700 mb-1">Email</label>
        <input
          [(ngModel)]="profile.email"
          class="w-full border p-2 rounded
                 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
      </div>

      <!-- ✅ SAVE & CANCEL (FIXED) -->
      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          class="bg-green-600 text-white px-4 py-2 rounded
                 hover:bg-green-700 transition-colors duration-300"
          (click)="save()">
          Save
        </button>

        <button
          type="button"
          class="bg-gray-400 text-black px-4 py-2 rounded
                 hover:bg-gray-500 transition-colors duration-300"
          (click)="cancel()">
          Cancel
        </button>
      </div>
    </div>

  </div>
</div>
