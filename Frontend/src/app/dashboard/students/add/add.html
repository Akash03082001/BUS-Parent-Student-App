<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">

  <h2 class="text-2xl font-semibold mb-6">
    Add Student
  </h2>

  <form (ngSubmit)="submit()" #studentForm="ngForm">

    <!-- NAME -->
    <label class="block mb-2 font-medium">Student Name</label>
    <input
      type="text"
      required
      name="name"
      [(ngModel)]="student.name"
      class="w-full mb-4 p-2 border rounded"
      placeholder="Enter student name"
    />

    <!-- DATE OF BIRTH -->
    <label class="block mb-2 font-medium">Date of Birth</label>
    <input
      type="date"
      required
      name="dateOfBirth"
      [(ngModel)]="student.dateOfBirth"
      class="w-full mb-4 p-2 border rounded"
    />

    <!-- GENDER -->
    <label class="block mb-2 font-medium">Gender</label>
    <select
      required
      name="gender"
      [(ngModel)]="student.gender"
      class="w-full mb-6 p-2 border rounded"
    >
      <option value="">Select</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <!-- ERROR -->
    <p *ngIf="errorMessage" class="text-red-600 mb-4">
      {{ errorMessage }}
    </p>

    <!-- ACTION BUTTONS -->
    <div class="flex justify-end gap-4">

      <button
        type="button"
        class="px-4 py-2 bg-gray-400 rounded"
        (click)="cancel()">
        Cancel
      </button>

      <button
        type="submit"
        class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
        [disabled]="studentForm.invalid || loading">
        {{ loading ? 'Saving...' : 'Add Student' }}
      </button>

    </div>

  </form>

</div>
