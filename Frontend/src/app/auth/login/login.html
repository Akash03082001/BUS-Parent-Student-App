<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div
    class="bg-white p-6 rounded shadow w-full max-w-sm mx-4
           transform transition-all duration-500 ease-out
           hover:scale-105"
  >
    <h2 class="text-xl font-bold mb-4 text-center">
      Parent Login
    </h2>

   
<form #loginForm="ngForm" (ngSubmit)="login(loginForm)">

  <input
    [(ngModel)]="email"
    name="email"
    type="text"
    placeholder="Email" 
    required
    class="w-full mb-3 p-2 border rounded focus:ring-2 focus:ring-blue-400" />

  <input
    [(ngModel)]="password"
    name="password"
    type="password"
    placeholder="Password"
    required
    class="w-full mb-4 p-2 border rounded focus:ring-2 focus:ring-blue-400" />

  <button
    type="submit"
    class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
    Login
  </button>

  <p *ngIf="errorMessage" class="text-red-500 text-sm mt-3 text-center">
    {{ errorMessage }}
  </p>

</form>


    <!-- Link to Register -->
    <p class="mt-5 text-sm text-center text-gray-600 dark:text-gray-300">
      New user?
      <a
        routerLink="/register"
        class="text-green-600 dark:text-green-400
               hover:underline font-medium"
      >
        Register here
      </a>
    </p>

  </div>
</div>
